# Data Science Domain Template Configuration

template:
  name: data-science
  version: 1.0.0
  description: "Data science and ML development with Python/Jupyter/PyTorch"
  author: Harness Creator

  # Detection rules for auto-matching
  detection:
    files:
      - "*.ipynb"
      - "pyproject.toml"
      - "requirements.txt"
      - "setup.py"
    directories:
      - "notebooks/"
      - "src/ml/"
      - "src/models/"
      - "pipelines/"
      - "data/"
    dependencies:
      - "torch"
      - "tensorflow"
      - "scikit-learn"
      - "pandas"
      - "numpy"
      - "jupyter"
    keywords:
      - "machine-learning"
      - "data-science"
      - "ml"
      - "ai"
      - "model"
      - "training"

  # Core agents (fixed)
  core_agents:
    - planner
    - generator
    - evaluator
    - architect-lead

  # Domain specialists
  specialists:
    - name: data-engineer
      source: ./specialists/data-engineer.yaml
      default: true
    - name: ml-engineer
      source: ./specialists/ml-engineer.yaml
      default: true
    - name: data-analyst
      source: ./specialists/data-analyst.yaml
      default: true
    - name: mlops-dev
      source: ./specialists/mlops-dev.yaml
      default: false  # Optional

  # Domain-specific skills
  skills:
    - name: experiment-tracking
      description: "ML experiment tracking and versioning"
    - name: data-validation
      description: "Data quality validation pipeline"
    - name: model-deployment
      description: "Model deployment workflow"

  # Domain-specific rules
  rules:
    - name: ml-code
      scope: "src/ml/**|src/models/**"
      file: ./rules/ml-code.md
    - name: data-code
      scope: "pipelines/**|data/**"
      file: ./rules/data-code.md
    - name: notebook-code
      scope: "notebooks/**"
      file: ./rules/notebook-code.md

  # Domain-specific evaluation
  evaluation:
    - name: model-criteria
      description: "ML model quality evaluation"
      file: ./evaluation/model-criteria.md
    - name: pipeline-criteria
      description: "Data pipeline evaluation"
      file: ./evaluation/pipeline-criteria.md

  # Project structure
  structure:
    directories:
      - src/ml/models
      - src/ml/training
      - src/ml/inference
      - src/data/pipelines
      - src/data/validation
      - notebooks
      - experiments
      - models/checkpoints
      - data/raw
      - data/processed

  # Integration points
  integration:
    events:
      - ModelTrainedEvent
      - DataValidatedEvent
      - PipelineCompletedEvent
    interfaces:
      - IModel
      - IPipeline
      - IDataSource