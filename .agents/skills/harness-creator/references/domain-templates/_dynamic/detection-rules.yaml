# Dynamic Specialist Generation Rules

# Detection rules for inferring specialists from project structure
detection:
  # Directory patterns → specialist suggestions
  directory_patterns:
    # Web Development
    - pattern: "src/frontend/**"
      suggests: frontend-dev
      confidence: high
    - pattern: "src/components/**"
      suggests: frontend-dev
      confidence: high
    - pattern: "src/api/**"
      suggests: api-dev
      confidence: high
    - pattern: "src/routes/**"
      suggests: api-dev
      confidence: medium
    - pattern: "src/models/**"
      suggests: database-dev
      confidence: high
    - pattern: "migrations/**"
      suggests: database-dev
      confidence: high

    # Game Development
    - pattern: "Scripts/Gameplay/**"
      suggests: gameplay-dev
      confidence: high
    - pattern: "Scripts/Mechanics/**"
      suggests: gameplay-dev
      confidence: high
    - pattern: "Scripts/Graphics/**"
      suggests: graphics-dev
      confidence: high
    - pattern: "Scripts/Audio/**"
      suggests: audio-dev
      confidence: high
    - pattern: "Assets/Shaders/**"
      suggests: graphics-dev
      confidence: high

    # Data Science
    - pattern: "src/ml/**"
      suggests: ml-engineer
      confidence: high
    - pattern: "notebooks/**"
      suggests: data-analyst
      confidence: high
    - pattern: "pipelines/**"
      suggests: data-engineer
      confidence: high
    - pattern: "models/**"
      suggests: ml-engineer
      confidence: medium

    # Mobile
    - pattern: "ios/**"
      suggests: ios-dev
      confidence: high
    - pattern: "android/**"
      suggests: android-dev
      confidence: high

  # File extensions → specialist suggestions
  file_extensions:
    # Frontend
    - extensions: [".tsx", ".jsx"]
      suggests: frontend-dev
    - extensions: [".vue"]
      suggests: frontend-dev
    - extensions: [".svelte"]
      suggests: frontend-dev

    # Backend
    - extensions: [".py"]
      suggests: api-dev
      context:
        - in_directory: "models"
          suggests: ml-engineer
        - in_directory: "pipelines"
          suggests: data-engineer
    - extensions: [".go"]
      suggests: api-dev
    - extensions: [".rs"]
      suggests: api-dev

    # Game Development
    - extensions: [".cs"]
      suggests: gameplay-dev
      context:
        - in_directory: "Graphics"
          suggests: graphics-dev
        - in_directory: "Audio"
          suggests: audio-dev
        - in_directory: "UI"
          suggests: ui-dev
    - extensions: [".gd"]
      suggests: gameplay-dev
      context:
        - in_directory: "graphics"
          suggests: graphics-dev
        - in_directory: "audio"
          suggests: audio-dev
    - extensions: [".shader", ".cginc"]
      suggests: graphics-dev

    # Data Science
    - extensions: [".ipynb"]
      suggests: data-analyst
    - extensions: [".r", ".R"]
      suggests: data-analyst

# Domain knowledge for generating responsibilities
domain_knowledge:
  gameplay-dev:
    responsibilities:
      - "Implement game mechanics and rules"
      - "Create state machines for game objects"
      - "Implement AI behavior"
    key_principles:
      - "State-First: Define states before behavior"
      - "Performance: Target 60fps minimum"

  graphics-dev:
    responsibilities:
      - "Implement rendering systems"
      - "Create and optimize shaders"
      - "Handle visual effects"
    key_principles:
      - "Visual Quality: Prioritize visual fidelity"
      - "Performance: Optimize draw calls"

  ml-engineer:
    responsibilities:
      - "Build and train ML models"
      - "Optimize model performance"
      - "Deploy models to production"
    key_principles:
      - "Reproducibility: Version all experiments"
      - "Validation: Always use hold-out test set"

# Common quality checklist items (applicable to most specialists)
common_quality_checklist:
  - "Code follows project conventions"
  - "No hardcoded values that should be configurable"
  - "Edge cases handled"
  - "Tests pass"
  - "No performance regression"