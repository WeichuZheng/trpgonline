# Dynamic Specialist Template

# This template is used when generating specialists for domains without pre-defined templates
# Variables: {{name}}, {{description}}, {{domain_scope}}, {{responsibilities}}

name: "{{name}}"
description: "{{description}}"

# Delegation mode (Fusion Architecture)
delegation:
  mode: spawned_by_generator
  contract_required: true
  can_modify_contract: false
  report_issues_to: generator

# Domain scope (filled from detection)
domain_scope:
  directories: []   # Filled dynamically
  files: []         # Filled dynamically
  excludes: []      # Filled dynamically

# Responsibilities (filled from domain knowledge or user input)
responsibilities: []

# Key principles (filled from domain knowledge)
key_principles: []

# Workflow (standard for all specialists)
workflow:
  - step: receive_task
    from: generator
    description: "Receive delegated task from Generator"
  - step: read_spec
    description: "Read specification from sprint contract"
  - step: implement
    description: "Implement the feature"
  - step: test
    description: "Test the implementation"
  - step: submit
    to: generator
    description: "Submit output to Generator"

# Quality checklist (common items + domain-specific)
quality_checklist:
  - "Feature works as designed in contract"
  - "Code follows project conventions"
  - "No hardcoded values that should be configurable"
  - "Edge cases handled"
  - "Tests pass"

# Anti-patterns (filled from domain knowledge)
anti_patterns: []

# Boundaries with other specialists (filled dynamically)
boundaries: []

---
# Example usage:

# User input: "I need a shader developer for my game"
# Detection: project has Assets/Shaders/ directory
# Generated:
#
# name: shader-dev
# description: "Specialist agent for shader development and visual effects"
# domain_scope:
#   directories:
#     - "Assets/Shaders/"
#     - "Scripts/Graphics/"
#   files:
#     - "*.shader"
#     - "*.cginc"
# responsibilities:
#   - "Write and optimize shaders"
#   - "Create visual effects"
#   - "Debug rendering issues"