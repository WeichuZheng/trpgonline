# Web Development Domain Template Configuration

template:
  name: web-development
  version: 1.0.0
  description: "Full-stack web application development with React/Vue/FastAPI"
  author: Harness Creator

  # Detection rules for auto-matching
  detection:
    files:
      - "package.json"
      - "tsconfig.json"
      - "pyproject.toml"
      - "requirements.txt"
    directories:
      - "src/frontend/"
      - "src/backend/"
      - "src/components/"
      - "src/api/"
      - "migrations/"
    dependencies:
      - "react"
      - "vue"
      - "fastapi"
      - "flask"
      - "express"
    keywords:
      - "web"
      - "frontend"
      - "backend"
      - "api"
      - "fullstack"

  # Core agents (fixed for all harnesses)
  core_agents:
    - planner
    - generator
    - evaluator
    - architect-lead

  # Domain specialists (adjustable by user)
  specialists:
    - name: frontend-dev
      source: ./specialists/frontend-dev.yaml
      default: true
    - name: api-dev
      source: ./specialists/api-dev.yaml
      default: true
    - name: database-dev
      source: ./specialists/database-dev.yaml
      default: true
    - name: devops-dev
      source: ./specialists/devops-dev.yaml
      default: false  # Optional

  # Domain-specific skills
  skills:
    - name: feature-plan
      description: "Coordinate full feature development across frontend, backend, database"
    - name: api-design
      description: "Design RESTful API endpoints and contracts"
    - name: db-migrate
      description: "Database migration workflow"
    - name: code-review
      description: "Architecture and quality code review"

  # Domain-specific rules (path-scoped)
  rules:
    - name: frontend-code
      scope: "src/frontend/**"
      file: ./rules/frontend-code.md
    - name: api-code
      scope: "src/backend/api/**"
      file: ./rules/api-code.md
    - name: database-code
      scope: "migrations/**|src/backend/models/**"
      file: ./rules/database-code.md

  # Domain-specific evaluation criteria
  evaluation:
    - name: frontend-criteria
      description: "Frontend quality evaluation"
      file: ./evaluation/frontend-criteria.md
    - name: backend-criteria
      description: "Backend API quality evaluation"
      file: ./evaluation/backend-criteria.md
    - name: api-criteria
      description: "API design evaluation"
      file: ./evaluation/api-criteria.md

  # Generated project structure
  structure:
    directories:
      - src/frontend/components
      - src/frontend/pages
      - src/frontend/hooks
      - src/backend/api
      - src/backend/services
      - src/backend/models
      - migrations
      - tests/frontend
      - tests/backend

  # Integration points
  integration:
    events:
      - UserAuthenticatedEvent
      - DataUpdatedEvent
    interfaces:
      - IAuthService
      - IDataService