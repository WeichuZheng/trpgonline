<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="card1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="card2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="card3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="featureGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 5 10 L 10 0 z" fill="#6b7280"/>
    </marker>
    <!-- unused marker kept for compatibility -->
  </defs>

  <!-- Background -->
  <rect width="800" height="550" fill="#f8fafc"/>

  <!-- Header -->
  <rect x="150" y="20" width="500" height="50" rx="25" fill="url(#headerGrad)"/>
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Harness Creator 核心价值</text>

  <!-- Three value cards -->
  <!-- Card 1: 一键部署 -->
  <g transform="translate(50, 90)">
    <rect x="0" y="0" width="220" height="100" rx="15" fill="url(#card1Grad)" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="110" cy="30" r="22" fill="#fbbf24"/>
    <text x="110" y="35" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle">1</text>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">一键部署</text>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="10" fill="#b45309" text-anchor="middle">一条命令获得完整框架</text>
  </g>

  <!-- Card 2: 融合架构 -->
  <g transform="translate(290, 90)">
    <rect x="0" y="0" width="220" height="100" rx="15" fill="url(#card2Grad)" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="110" cy="30" r="22" fill="#60a5fa"/>
    <text x="110" y="35" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle">2</text>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af" text-anchor="middle">融合架构</text>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="10" fill="#2563eb" text-anchor="middle">GAN 启发核心 + 领域专家</text>
  </g>

  <!-- Card 3: 三层分工 -->
  <g transform="translate(530, 90)">
    <rect x="0" y="0" width="220" height="100" rx="15" fill="url(#card3Grad)" stroke="#10b981" stroke-width="2"/>
    <circle cx="110" cy="30" r="22" fill="#34d399"/>
    <text x="110" y="35" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle">3</text>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#047857" text-anchor="middle">三层分工</text>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="10" fill="#059669" text-anchor="middle">决策 -&gt; 执行 -&gt; 评估</text>
  </g>

  <!-- Arrows down: horizontal bar connecting all three cards, then single arrow -->
  <line x1="160" y1="195" x2="160" y2="210" stroke="#f59e0b" stroke-width="2"/>
  <line x1="400" y1="195" x2="400" y2="210" stroke="#3b82f6" stroke-width="2"/>
  <line x1="640" y1="195" x2="640" y2="210" stroke="#10b981" stroke-width="2"/>
  <line x1="160" y1="210" x2="640" y2="210" stroke="#cbd5e1" stroke-width="2"/>
  <!-- Arrow down from cards bar to features -->
  <path d="M 400 210 L 400 227" stroke="#6b7280" stroke-width="2.5" fill="none"/>
  <polygon points="394,227 400,237 406,227" fill="#6b7280"/>

  <!-- Feature boxes row -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="700" height="80" rx="12" fill="url(#featureGrad)" stroke="#818cf8" stroke-width="1.5"/>

    <!-- Left: 领域模板 -->
    <g transform="translate(30, 15)">
      <rect x="0" y="0" width="200" height="50" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
      <text x="100" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4338ca" text-anchor="middle">领域模板</text>
      <text x="100" y="38" font-family="Arial, sans-serif" font-size="9" fill="#6366f1" text-anchor="middle">Web / Game / Data Science</text>
    </g>

    <!-- Right: Sprint Contract -->
    <g transform="translate(280, 15)">
      <rect x="0" y="0" width="200" height="50" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
      <text x="100" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle">Sprint Contract</text>
      <text x="100" y="38" font-family="Arial, sans-serif" font-size="9" fill="#b45309" text-anchor="middle">三方协商，明确责任</text>
    </g>

    <!-- Far right: Specialists -->
    <g transform="translate(500, 15)">
      <rect x="0" y="0" width="170" height="50" rx="8" fill="#d1fae5" stroke="#4ade80" stroke-width="1"/>
      <text x="85" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">Specialists</text>
      <text x="85" y="38" font-family="Arial, sans-serif" font-size="9" fill="#16a34a" text-anchor="middle">动态专家分工</text>
    </g>
  </g>

  <!-- Arrow down -->
  <!-- Arrow down from features to Context Reset -->
  <path d="M 400 320 L 400 330" stroke="#6b7280" stroke-width="2" fill="none"/>
  <polygon points="394,330 400,340 406,330" fill="#6b7280"/>

  <!-- Context Reset box -->
  <g transform="translate(150, 350)">
    <rect x="0" y="0" width="500" height="60" rx="12" fill="#f0f4ff" stroke="#818cf8" stroke-width="1.5"/>
    <text x="250" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338ca" text-anchor="middle">Context Reset</text>
    <text x="250" y="45" font-family="Arial, sans-serif" font-size="10" fill="#6366f1" text-anchor="middle">支持长时间任务 | 无偏差交接 | 状态持久</text>
  </g>

  <!-- Arrow down -->
  <!-- Arrow down from Context Reset to footer -->
  <path d="M 400 410 L 400 420" stroke="#6b7280" stroke-width="2" fill="none"/>
  <polygon points="394,420 400,430 406,420" fill="#6b7280"/>

  <!-- Footer quote -->
  <rect x="100" y="440" width="600" height="50" rx="25" fill="url(#footerGrad)"/>
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">"让 AI 不再自欺欺人，每个决策都有独立第三方审核"</text>
</svg>