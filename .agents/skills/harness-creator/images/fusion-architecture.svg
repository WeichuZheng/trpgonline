<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 550" width="950" height="550">
  <defs>
    <!-- Gradients -->
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="executionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="evaluationGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="contractGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="generatorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="evaluatorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <linearGradient id="specialistGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="950" height="550" fill="#f8fafc"/>

  <!-- Title -->
  <text x="475" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#374151" text-anchor="middle">Fusion Architecture: GAN 启发 + 领域专家</text>

  <!-- Decision Layer: positioned higher -->
  <g transform="translate(50, 40)">
    <rect x="0" y="0" width="240" height="75" rx="14" fill="url(#decisionGrad)" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
    <text x="120" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4f46e5" text-anchor="middle">决策层 Decision Layer</text>

    <!-- Planner -->
    <rect x="12" y="30" width="100" height="36" rx="8" fill="white" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="62" y="48" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4338ca" text-anchor="middle">Planner</text>
    <text x="62" y="60" font-family="Arial, sans-serif" font-size="8" fill="#6366f1" text-anchor="middle">产品决策 WHAT</text>

    <!-- Architect Lead -->
    <rect x="128" y="30" width="100" height="36" rx="8" fill="white" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="178" y="46" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4338ca" text-anchor="middle">architect-lead</text>
    <text x="178" y="60" font-family="Arial, sans-serif" font-size="8" fill="#6366f1" text-anchor="middle">架构决策 HOW</text>

    <!-- Planner to architect-lead arrows -->
    <path d="M 115 52 L 122 52" stroke="#6b7280" stroke-width="1.5"/>
    <polygon points="122,48 132,52 122,56" fill="#6b7280"/>
    <text x="112" y="46" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">委托</text>

    <path d="M 125 62 L 118 62" stroke="#6b7280" stroke-width="1.5"/>
    <polygon points="118,58 108,62 118,66" fill="#6b7280"/>
    <text x="112" y="76" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">反馈</text>
  </g>

  <!-- Execution Layer -->
  <g transform="translate(50, 140)">
    <rect x="0" y="0" width="420" height="160" rx="14" fill="url(#executionGrad)" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">执行层 Execution Layer</text>

    <!-- Generator: smaller, more space to Specialists -->
    <rect x="15" y="45" width="100" height="55" rx="10" fill="url(#generatorGrad)" stroke="#10b981" stroke-width="2"/>
    <text x="65" y="63" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#047857" text-anchor="middle">Generator</text>
    <text x="65" y="78" font-family="Arial, sans-serif" font-size="8" fill="#059669" text-anchor="middle">协调者</text>
    <text x="65" y="92" font-family="Arial, sans-serif" font-size="12" fill="#059669" text-anchor="middle">↻</text>

    <!-- Specialists Group: more space from Generator -->
    <rect x="135" y="40" width="270" height="95" rx="10" fill="url(#specialistGrad)" stroke="#4ade80" stroke-width="1.5"/>
    <text x="270" y="56" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#16a34a" text-anchor="middle">领域专家 Specialists</text>

    <!-- Specialist boxes: two rows -->
    <rect x="145" y="65" width="70" height="26" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
    <text x="180" y="82" font-family="Arial, sans-serif" font-size="8" fill="#166534" text-anchor="middle">frontend-dev</text>

    <rect x="223" y="65" width="60" height="26" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
    <text x="253" y="82" font-family="Arial, sans-serif" font-size="8" fill="#166534" text-anchor="middle">api-dev</text>

    <rect x="291" y="65" width="75" height="26" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
    <text x="328" y="82" font-family="Arial, sans-serif" font-size="8" fill="#166534" text-anchor="middle">ml-engineer</text>

    <rect x="145" y="97" width="70" height="26" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
    <text x="180" y="114" font-family="Arial, sans-serif" font-size="8" fill="#166534" text-anchor="middle">gameplay-dev</text>

    <rect x="223" y="97" width="50" height="26" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
    <text x="248" y="114" font-family="Arial, sans-serif" font-size="9" fill="#166534" text-anchor="middle">...</text>

    <!-- Generator to Specialists arrows (inside Execution Layer) -->
    <path d="M 118 72 L 129 72" stroke="#059669" stroke-width="2"/>
    <polygon points="129,68 139,72 129,76" fill="#059669"/>
    <text x="120" y="64" font-family="Arial, sans-serif" font-size="9" fill="#059669" font-weight="bold">spawn</text>

    <path d="M 132 97 L 121 97" stroke="#059669" stroke-width="2"/>
    <polygon points="121,93 111,97 121,101" fill="#059669"/>
    <text x="122" y="114" font-family="Arial, sans-serif" font-size="9" fill="#059669" font-weight="bold">实现</text>
  </g>

  <!-- Evaluation Layer -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="180" height="70" rx="14" fill="url(#evaluationGrad)" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">评估层 Evaluation Layer</text>

    <rect x="30" y="32" width="120" height="30" rx="8" fill="url(#evaluatorGrad)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="90" y="48" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#b91c1c" text-anchor="middle">Evaluator</text>
    <text x="90" y="60" font-family="Arial, sans-serif" font-size="8" fill="#dc2626" text-anchor="middle">质量评分</text>
  </g>

  <!-- Sprint Contract -->
  <g transform="translate(520, 165)">
    <rect x="0" y="0" width="380" height="110" rx="14" fill="url(#contractGrad)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#b45309" text-anchor="middle">Sprint Contract 三方协商</text>

    <!-- Three approval steps with small arrows -->
    <g transform="translate(20, 38)">
      <rect x="0" y="0" width="85" height="28" rx="6" fill="white" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="42" y="18" font-family="Arial, sans-serif" font-size="8" fill="#92400e" text-anchor="middle">Generator 提议</text>

      <!-- Small arrow -->
      <path d="M 87 14 L 94 14" stroke="#d97706" stroke-width="1.5"/>
      <polygon points="94,10 104,14 94,18" fill="#d97706"/>

      <rect x="100" y="0" width="85" height="28" rx="6" fill="white" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="142" y="18" font-family="Arial, sans-serif" font-size="8" fill="#92400e" text-anchor="middle">architect 审核</text>

      <!-- Small arrow -->
      <path d="M 187 14 L 194 14" stroke="#d97706" stroke-width="1.5"/>
      <polygon points="194,10 204,14 194,18" fill="#d97706"/>

      <rect x="200" y="0" width="85" height="28" rx="6" fill="white" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="242" y="18" font-family="Arial, sans-serif" font-size="8" fill="#92400e" text-anchor="middle">Evaluator 审核</text>
    </g>

    <text x="190" y="92" font-family="Arial, sans-serif" font-size="9" fill="#92400e" text-anchor="middle">批准后返回 Generator</text>
  </g>

  <!-- Flow arrows: cleaner paths with proper spacing -->

  <!-- Planner to Generator -->
  <path d="M 62 115 L 62 155 L 65 177" stroke="#6b7280" stroke-width="1.5" fill="none"/>
  <polygon points="60,177 65,187 70,177" fill="#6b7280"/>
  <text x="72" y="150" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">需求</text>

  <!-- Architect to Generator -->
  <path d="M 178 115 L 178 150 L 115 177" stroke="#6b7280" stroke-width="1.5" fill="none"/>
  <polygon points="110,177 115,187 120,177" fill="#6b7280"/>
  <text x="160" y="142" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">架构</text>

  <!-- Generator to Evaluator -->
  <path d="M 65 200 L 65 290 L 90 332" stroke="#6b7280" stroke-width="1.5" fill="none"/>
  <polygon points="85,332 90,342 95,332" fill="#6b7280"/>
  <text x="75" y="290" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">交付</text>

  <!-- Evaluator feedback to Generator -->
  <path d="M 50 360 Q 30 320 30 280 L 35 242" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="30,242 35,252 40,242" fill="#dc2626"/>
  <text x="40" y="320" font-family="Arial, sans-serif" font-size="9" fill="#dc2626" font-weight="bold">评分反馈</text>

  <!-- Contract to Specialists -->
  <path d="M 520 203 L 480 203 L 440 212 L 408 212" stroke="#d97706" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="408,207 398,212 408,217" fill="#d97706"/>
</svg>