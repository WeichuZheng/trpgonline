<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="problemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="solutionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="generatorBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="evaluatorBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 5 10 L 10 0 z" fill="#6b7280"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="#fafafa"/>

  <!-- Header -->
  <rect x="150" y="20" width="500" height="50" rx="25" fill="url(#headerGrad)"/>
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">模型无法可靠评估自己的工作</text>

  <!-- Problem Section -->
  <g transform="translate(50, 90)">
    <rect x="0" y="0" width="700" height="200" rx="15" fill="url(#problemGrad)" stroke="#f87171" stroke-width="2"/>
    <text x="350" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">单一 Agent 自评时的问题</text>

    <!-- Single agent box -->
    <rect x="80" y="50" width="140" height="80" rx="10" fill="url(#generatorBox)" stroke="#f59e0b" stroke-width="2"/>
    <text x="150" y="75" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle">Generator</text>
    <text x="150" y="92" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#b45309" text-anchor="middle">+</text>
    <text x="150" y="110" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle">Evaluator</text>
    <text x="150" y="125" font-family="Arial, sans-serif" font-size="8" fill="#b45309" text-anchor="middle">(同一个)</text>

    <!-- Arrow to output -->
    <path d="M 220 95 L 280 95" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>

    <!-- Output box -->
    <rect x="290" y="65" width="180" height="60" rx="8" fill="#fff1f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="380" y="85" font-family="Arial, sans-serif" font-size="10" fill="#b91c1c" text-anchor="middle">"看起来不错，完成了!"</text>
    <text x="380" y="105" font-family="Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">(实际可能遗漏边缘情况)</text>

    <!-- Problem list -->
    <g transform="translate(500, 50)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">问题清单:</text>
      <text x="0" y="38" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">x 把平庸输出称为"完成"</text>
      <text x="0" y="58" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">x 跳过边缘情况和错误处理</text>
      <text x="0" y="78" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">x 遗漏集成问题</text>
      <text x="0" y="98" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">x 接受不完整的解决方案</text>
    </g>
  </g>

  <!-- Arrow down -->
  <path d="M 400 300 L 400 320" stroke="#6b7280" stroke-width="2" fill="none"/>
  <polygon points="395,320 400,330 405,320" fill="#6b7280"/>
  <text x="420" y="318" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">分离后</text>

  <!-- Solution Section -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="700" height="250" rx="15" fill="url(#solutionGrad)" stroke="#34d399" stroke-width="2"/>
    <text x="350" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#059669" text-anchor="middle">分离后的效果</text>

    <!-- Generator box -->
    <rect x="50" y="50" width="120" height="60" rx="10" fill="url(#generatorBox)" stroke="#f59e0b" stroke-width="2"/>
    <text x="110" y="75" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle">Generator</text>
    <text x="110" y="95" font-family="Arial, sans-serif" font-size="9" fill="#b45309" text-anchor="middle">(生成者)</text>

    <!-- Arrow -->
    <path d="M 170 80 L 230 80" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

    <!-- Evaluator box -->
    <rect x="240" y="50" width="120" height="60" rx="10" fill="url(#evaluatorBox)" stroke="#3b82f6" stroke-width="2"/>
    <text x="300" y="75" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Evaluator</text>
    <text x="300" y="95" font-family="Arial, sans-serif" font-size="9" fill="#2563eb" text-anchor="middle">(评估者)</text>

    <!-- Arrow to output -->
    <path d="M 360 80 L 420 80" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

    <!-- Output -->
    <rect x="430" y="45" width="200" height="70" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="530" y="68" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#047857" text-anchor="middle">真实的质量评估</text>
    <text x="530" y="90" font-family="Arial, sans-serif" font-size="9" fill="#059669" text-anchor="middle">独立第三方审核</text>

    <!-- Specialist and Contract boxes below -->
    <rect x="50" y="145" width="120" height="50" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
    <text x="110" y="165" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle">Specialist</text>
    <text x="110" y="180" font-family="Arial, sans-serif" font-size="9" fill="#16a34a" text-anchor="middle">领域专家</text>

    <rect x="240" y="145" width="120" height="50" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="300" y="165" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">Contract</text>
    <text x="300" y="180" font-family="Arial, sans-serif" font-size="9" fill="#2563eb" text-anchor="middle">责任表</text>

    <!-- Solution list -->
    <g transform="translate(430, 135)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#059669">解决方案:</text>
      <text x="0" y="38" font-family="Arial, sans-serif" font-size="10" fill="#047857">+ 生成和评估由不同 agent 负责</text>
      <text x="0" y="58" font-family="Arial, sans-serif" font-size="10" fill="#047857">+ 复杂实现委托给领域专家</text>
      <text x="0" y="78" font-family="Arial, sans-serif" font-size="10" fill="#047857">+ Contract 明确可测试标准</text>
      <text x="0" y="98" font-family="Arial, sans-serif" font-size="10" fill="#047857">+ 问题定位到具体 specialist</text>
    </g>

    <!-- Vertical arrows -->
    <path d="M 110 110 L 110 135" stroke="#6b7280" stroke-width="1.5" fill="none"/>
    <polygon points="105,135 110,145 115,135" fill="#6b7280"/>
    <path d="M 300 110 L 300 135" stroke="#6b7280" stroke-width="1.5" fill="none"/>
    <polygon points="295,135 300,145 305,135" fill="#6b7280"/>
  </g>
</svg>